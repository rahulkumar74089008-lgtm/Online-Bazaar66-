<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onlinebazaar66 – Shop Smarter</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <!-- Loading Spinner -->
  <div id="global-loader" class="loader-overlay"><div class="spinner"></div></div>

  <!-- Navbar -->
  <header class="navbar">
    <div class="container navbar-inner">
      <a href="#" class="brand"><i class="fas fa-store"></i> Onlinebazaar66</a>
      <div class="navbar-actions">
        <div class="search-wrapper">
          <input type="text" id="search-input" placeholder="Search..." />
          <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <button class="cart-btn" id="cart-toggle">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cart-count">0</span>
        </button>
        <div id="auth-section">
          <button class="btn btn-outline" id="login-btn">Login</button>
          <button class="btn btn-primary" id="register-btn">Register</button>
        </div>
        <div id="user-section" class="hidden">
          <span id="user-greeting">Hello, User</span>
          <button class="btn btn-outline" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container main-content">
    <section id="product-section">
      <div class="section-header">
        <h2>Featured Products</h2>
        <p id="product-count"></p>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </section>

    <!-- Admin Panel -->
    <section id="admin-panel" class="admin-panel hidden">
      <h3><i class="fas fa-cog"></i> Admin Dashboard</h3>
      <button class="btn btn-primary" id="add-product-btn"><i class="fas fa-plus"></i> Add Product</button>
      <div id="admin-product-list" class="admin-product-list"></div>
    </section>
  </main>

  <!-- Cart Sidebar -->
  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button id="cart-close">&times;</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total:</span><span id="cart-total-price">$0.00</span></div>
      <button class="btn btn-primary btn-block" id="checkout-btn">Checkout</button>
    </div>
  </aside>
  <div class="cart-overlay" id="cart-overlay"></div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal">
      <button class="modal-close" id="auth-modal-close">&times;</button>
      <div class="modal-body" id="auth-modal-body"></div>
    </div>
  </div>

  <!-- Product Modal (Add/Edit) -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal modal-lg">
      <button class="modal-close" id="product-modal-close">&times;</button>
      <div class="modal-body" id="product-modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 Onlinebazaar66. All rights reserved.</p></div>
  </footer>

  <!-- Module Imports -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initAuthObserver } from './js/auth-logic.js';
    import { initUI, updateAuthUI, renderProducts } from './js/ui-controller.js';

    // Initialize the UI
    initUI();

    // Listen to auth state changes
    initAuthObserver((user, admin) => {
      updateAuthUI(user, admin);
      if (user) renderProducts(); // refresh products to show admin controls
    });

    // Search functionality (simple client-side filter)
    document.getElementById('search-btn').addEventListener('click', () => {
      const query = document.getElementById('search-input').value.toLowerCase();
      const cards = document.querySelectorAll('.product-card');
      cards.forEach(card => {
        const name = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = name.includes(query) ? '' : 'none';
      });
    });
    document.getElementById('search-input').addEventListener('input', () => {
      document.getElementById('search-btn').click();
    });

    // Checkout alert
    document.getElementById('checkout-btn').addEventListener('click', () => {
      alert('Checkout functionality coming soon!');
    });
  </script>
</body>
  </html>
