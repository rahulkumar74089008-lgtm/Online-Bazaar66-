<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Online Bazaar66</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo"><i class="fa-solid fa-user-shield"></i> Admin Portal</div>
        <nav>
            <a href="index.html"><i class="fa-solid fa-eye"></i> View Shop</a>
            <a href="admin.html" class="active"><i class="fa-solid fa-plus"></i> Add Product</a>
        </nav>
    </header>

    <main class="container">
        <div class="admin-card">
            <h2><i class="fa-solid fa-box-open"></i> Add New Product</h2>
            <p id="status-message" class="status-message"></p>
            
            <form id="product-form">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="product-name" placeholder="E.g., Designer Kurta" required>
                </div>

                <div class="form-group">
                    <label>Price (INR)</label>
                    <input type="number" id="product-price" placeholder="E.g., 999" required>
                </div>

                <div class="form-group">
                    <label>Upload High Quality Image</label>
                    <input type="file" id="product-image" accept="image/*" required>
                </div>

                <button type="submit" id="submit-btn">Upload to Store</button>
            </form>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
