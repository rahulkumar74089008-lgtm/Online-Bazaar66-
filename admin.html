<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onlinebazaar66 – Shop Smarter</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- ===== LOADING SPINNER ===== -->
    <div id="global-loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <!-- ===== NAVIGATION ===== -->
    <header class="navbar">
        <div class="container navbar-inner">
            <a href="#" class="brand" id="brand-link">
                <i class="fas fa-store"></i> Onlinebazaar66
            </a>

            <div class="navbar-actions">
                <!-- Search (optional) -->
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Search products..." aria-label="Search" />
                    <button id="search-btn" aria-label="Search"><i class="fas fa-search"></i></button>
                </div>

                <!-- Cart -->
                <button class="cart-btn" id="cart-toggle" aria-label="Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </button>

                <!-- Auth / User -->
                <div class="auth-section" id="auth-section">
                    <button class="btn btn-outline" id="login-btn">Login</button>
                    <button class="btn btn-primary" id="register-btn">Register</button>
                </div>
                <div class="user-section hidden" id="user-section">
                    <span class="user-greeting" id="user-greeting">Hello, User</span>
                    <button class="btn btn-outline" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="container main-content">
        <!-- Product Grid -->
        <section id="product-section">
            <div class="section-header">
                <h2>Featured Products</h2>
                <p id="product-count"></p>
            </div>
            <div class="product-grid" id="product-grid">
                <!-- Products rendered by JavaScript -->
            </div>
        </section>

        <!-- Admin Panel (visible only to admin) -->
        <section id="admin-panel" class="admin-panel hidden">
            <h3><i class="fas fa-cog"></i> Admin Dashboard</h3>
            <div class="admin-actions">
                <button class="btn btn-primary" id="add-product-btn"><i class="fas fa-plus"></i> Add Product</button>
            </div>
            <div id="admin-product-list" class="admin-product-list">
                <!-- Admin product list rendered by JS -->
            </div>
        </section>
    </main>

    <!-- ===== CART SIDEBAR ===== -->
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
            <button class="cart-close" id="cart-close">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items rendered by JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button class="btn btn-primary btn-block" id="checkout-btn">Checkout</button>
        </div>
    </aside>
    <div class="cart-overlay" id="cart-overlay"></div>

    <!-- ===== AUTH MODAL ===== -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal">
            <button class="modal-close" id="auth-modal-close">&times;</button>
            <div class="modal-body" id="auth-modal-body">
                <!-- Login/Register forms rendered by JS -->
            </div>
        </div>
    </div>

    <!-- ===== PRODUCT FORM MODAL (Admin) ===== -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal modal-lg">
            <button class="modal-close" id="product-modal-close">&times;</button>
            <div class="modal-body" id="product-modal-body">
                <!-- Product form rendered by JS -->
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Onlinebazaar66. All rights reserved.</p>
        </div>
    </footer>

    <!-- ===== FIREBASE MODULES ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
            }
        }
    </script>

    <!-- ===== APPLICATION SCRIPTS ===== -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
